<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DMS — Register your school to get started with the Discipline Management System.">
    <title>Register School — DMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body class="login-page">
    <div class="bg-anim">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="login-wrapper" style="justify-content:center;align-items:center;padding:32px 16px;">
        <div class="login-panel"
            style="width:100%;max-width:520px;border-radius:24px;border:1px solid rgba(99,102,241,0.15);">
            <div class="login-card" style="max-width:100%;">
                <div style="text-align:center;margin-bottom:28px;">
                    <div class="brand-logo" style="justify-content:center;margin-bottom:16px;">
                        <div class="logo-icon" style="width:48px;height:48px;">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M24 4L6 12V24C6 33.6 14.16 42.72 24 44C33.84 42.72 42 33.6 42 24V12L24 4Z"
                                    fill="url(#g1)" />
                                <path
                                    d="M18 24H22V28H18V24ZM26 24H30V28H26V24ZM18 18H22V22H18V18ZM26 18H30V22H26V18ZM18 30H22V34H18V30ZM26 30H30V34H26V30Z"
                                    fill="white" opacity="0.9" />
                                <defs>
                                    <linearGradient id="g1" x1="6" y1="4" x2="42" y2="44"
                                        gradientUnits="userSpaceOnUse">
                                        <stop stop-color="#6366f1" />
                                        <stop offset="1" stop-color="#8b5cf6" />
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                    </div>
                    <h2 style="font-size:1.5rem;font-weight:800;color:#f1f5f9;">Register Your School</h2>
                    <p style="color:#64748b;font-size:0.875rem;margin-top:4px;">Create a DoD account to manage your
                        school's discipline system</p>
                </div>

                <form id="registerForm" style="display:flex;flex-direction:column;gap:16px;">
                    <div class="form-group">
                        <label for="schoolName">School Name</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 3L1 9l4 2.18V17h2v-4.82l2 1.09V17c0 2.21 3.58 4 8 4s8-1.79 8-4v-3.73L23 9 12 3zm6 13c0 .91-2.63 2-6 2s-6-1.09-6-2v-2.27l6 3.27 6-3.27V16z" />
                            </svg>
                            <input type="text" id="schoolName" placeholder="e.g. Greenfield Academy" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dodUser">DoD Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            </svg>
                            <input type="text" id="dodUser" placeholder="Choose a username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z" />
                            </svg>
                            <input type="password" id="regPassword" placeholder="Create a strong password" required>
                            <button type="button" class="toggle-pass" onclick="togglePass('regPassword',this)">
                                <svg viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="promoCode">Teacher Promo Code</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M20 6h-2.18c.07-.44.18-.86.18-1.3C18 2.12 15.88 0 13.3 0c-1.3 0-2.4.5-3.2 1.3L10 1.4l-.1-.1C9.2.5 8.1 0 6.8 0 4.22 0 2.1 2.12 2.1 4.7c0 .44.11.86.18 1.3H0v14c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-7.7-4.5c.73 0 1.4.35 1.8.88L12 5l-2.1-2.62c.4-.53 1.07-.88 2.1-.88zm-5.6 0c1.03 0 1.7.35 2.1.88L7 5 4.9 2.38c.4-.53 1.07-.88 2.1-.88zm13.3 16H4V8h16v9.5z" />
                            </svg>
                            <input type="text" id="promoCode" placeholder="Auto-generated (editable)"
                                value="TEACHER2026">
                        </div>
                        <small style="color:#64748b;font-size:0.75rem;">Teachers will use this code to register in your
                            school.</small>
                    </div>

                    <div id="regError" class="error-msg" style="display:none;"></div>

                    <button type="submit" class="btn-login" id="regBtn">
                        <span>Register School</span>
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" />
                        </svg>
                    </button>

                    <div class="register-link">
                        <p>Already have an account? <a href="index.html">Sign In</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script>
        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const schoolName = document.getElementById('schoolName').value.trim();
            const username = document.getElementById('dodUser').value.trim();
            const password = document.getElementById('regPassword').value;
            const promoCode = document.getElementById('promoCode').value.trim() || 'TEACHER2026';
            const errEl = document.getElementById('regError');
            errEl.style.display = 'none';

            if (password.length < 6) {
                errEl.textContent = 'Password must be at least 6 characters.';
                errEl.style.display = 'block';
                return;
            }

            const btn = document.getElementById('regBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span>Creating school...</span>';
            btn.disabled = true;

            try {
                const school = await Auth.registerSchool({ school_name: schoolName, dod_username: username, password, promo_code: promoCode });
                await DB.addLog(school._id, `School "${schoolName}" registered`, username, 'auth');
                Auth.setSession({ role: 'dod', id: school._id, username, schoolId: school._id, schoolName });
                window.location.href = 'dod-dashboard.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.style.display = 'block';
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        });
    </script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
</body>

</html>
